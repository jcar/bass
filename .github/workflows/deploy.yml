name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build Strikezone (Next.js app) into strikezone/out/
      - name: Install strikezone deps
        run: npm ci
        working-directory: strikezone

      - name: Build strikezone
        run: npx next build
        working-directory: strikezone

      # Build Slidev deck into strikezone/out/slides/
      - name: Install slides deps
        run: npm install
        working-directory: slides

      - name: Build slides
        run: npx slidev build --base /bass/slides/ --out ../strikezone/out/slides
        working-directory: slides

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: strikezone/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
